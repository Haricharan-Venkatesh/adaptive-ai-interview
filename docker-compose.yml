version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: adaptive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adaptive_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: adaptive_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    container_name: adaptive_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data: